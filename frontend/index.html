<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ddrlxvnsh/image/upload/v1766855787/jewllery_shop/logos/alankara-emblem.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aabhar - Premium Indian Jewelry | Exquisite Gold, Diamond, Silver & Platinum Jewelry for Every Occasion" />
    <meta name="keywords" content="Aabhar, jewelry, gold, diamond, silver, platinum, rings, necklaces, earrings, bangles, bridal jewelry, Indian jewelry" />
    <meta name="theme-color" content="#D4AF37" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('jewelry-theme');
          var theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <title>Aabhar | Premium Indian Jewelry</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
